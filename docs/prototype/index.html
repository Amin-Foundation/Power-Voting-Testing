<style>
  /* Theme — extracted from client/src/theme.tsx (kept in sync with docs/mocks/ui-preview.html) */

    --textDark: #111;

    --primaryActive: #4e65bd;
    --secondary: #E6E0D4;
    --mediumGray: #8f8f8f;
    --lightGray: #afafaf;
    --lighterGray: #e2ddd5;
    --bgGrayLight: #f3f0e9;
    --bgGray: #ede8dd;
    --bgGrayActive: #ede4d1;
    --bgDarkWhite: #f2f2ef;
    --bgOffWhite: #faf9f6;
    --bgWhite: #fff;
    --green: #2fcc71;
    --greenDeep: #539a33;
    --red: #e74b3c;
    --redDeep: #dd413c;
    --prOpen: #64B75D;
    --prDraft: #868D96;
    --prMerged: #9C73EF;
    --prClosed: #E55E51;
    --pollBlue: #0090ff;

  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;

  }
  h1,h2,h3,h4 { font-family: "Instrument Sans", Inter, sans-serif; color: var(--textDark); }

  /* ---- prototype banner ---- */
  .proto-bar {
    position: sticky; top: 0; z-index: 100;
    background: #1f1f23; color: #f1ece2;
    padding: 9px 18px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .proto-bar .label {
    font-weight: 700; font-size: 13px;
    letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.7;
  }
  .proto-bar .note { font-size: 12px; opacity: 0.6; }
  .proto-bar .spacer { margin-left: auto; }
  .proto-bar .wallet-chip {

  .proto-bar button.link {
    background: transparent; color: #cfd6f5; border: 0; cursor: pointer;
    font-size: 12.5px; font-family: inherit; text-decoration: underline; padding: 0;
  }

  .frame {
    max-width: 1180px; margin: 22px auto;
    background: var(--bg); border: 1px solid #d6d0c2;

  .btn {

  /* role grid */
  .role-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 4px 0 8px; }
  .role-card {
    border: 1px solid #e2ddd5; border-radius: 10px; padding: 12px 14px;

  input[type=text], textarea, select {

  /* polis voting */
  .polis-progress { display: flex; align-items: center; gap: 8px; color: var(--mediumGray); font-size: 13px; margin-bottom: 14px; }

  .polis-card {

  /* report */

  .bars-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; font-size: 13.5px; }
  .bars-row .lab { flex: 1; }
  .bars-row .track { width: 46%; height: 16px; border-radius: 4px; background: #f0ece2; overflow: hidden; }
  .bars-row .track > span { display: block; height: 100%; }
  .bars-row .pct { width: 42px; text-align: right; color: var(--mediumGray); }

  .ai-panel {
    border: 1px solid #cfe0ea; border-radius: 12px; overflow: hidden; margin: 16px 0 22px; background: #fff;
  }
  .ai-panel .ai-head {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;

  .ai-panel .ai-head .badge {

  .ai-panel .ai-head .title { font-weight: 700; color: var(--textDark); }
  .ai-panel .ai-body { padding: 16px 18px; font-size: 14.5px; line-height: 1.6; }

  .ai-panel .ai-body .headline {

  }
  .ai-panel .ai-foot { padding: 8px 18px 14px; font-size: 11.5px; color: var(--mediumGray); }
  .chip {

  .chip.pos { background: #eefaf2; border-color: #bfe6cd; color: var(--greenDeep); }

  .comment { border-bottom: 1px solid #eee; padding: 12px 0; font-size: 14px; }
  .comment:last-child { border-bottom: 0; }
  .comment .who { font-weight: 600; color: var(--textDark); font-size: 13px; }
  .comment .when { color: var(--mediumGray); font-size: 12px; margin-left: 6px; }

  .crumb { font-size: 13px; margin-bottom: 14px; }
  .divider { height: 1px; background: #eee; margin: 18px 0; }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,18,14,0.45); z-index: 200;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; max-width: 520px; width: 100%;
    padding: 26px 26px 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { margin: 0 0 6px; font-size: 19px; }
  .sig-preview {
    background: #faf7f2; border: 1px solid #e6e0d4; border-radius: 8px;
    padding: 12px 14px; font-family: monospace; font-size: 12px; color: #555;

  .toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 300; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: #1f1f23; color: #f1ece2; padding: 10px 16px; border-radius: 8px;

  .toast.err { background: #7a2b25; }

  @keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .ico { font-style: normal; }
  .active-profile-bar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;

  .empty { text-align: center; color: var(--mediumGray); padding: 30px 10px; font-size: 14px; }

<script>
"use strict";
/* =========================================================================
   Fil Poll — wallet voting prototype (self-contained, zero-dependency)
   -------------------------------------------------------------------------
   Purpose: a clickable pre-production prototype of the flow:
     connect wallet -> pick a voting profile (role) -> optionally CLAIM an
     address (one-time signature -> short-lived delegated session) ->
     create a poll question -> vote -> read results + on-device AI insight.

   Security notes (deliberate design choices):
   - "Claim address" is ALWAYS gated by a signature that proves control of
     that address. Discovery of ecosystem addresses is for convenience only
     and never grants voting authority. In production the server verifies the
     signature (ecrecover) before minting a session — the client cannot be
     trusted to self-certify. This prototype records the exact payload the
     server would verify.
   - The demo wallet keypair lives ONLY in memory for the tab's lifetime. It
     is never written to storage, never logged, never rendered. No real
     private key ever touches this code.
   - AI insight runs fully on-device (no network, no API key). Where a real
     LLM (Claude) would run, it runs server-side over the same inputs.
   ========================================================================= */

/* ---------------- storage (no key material, ever) ---------------- */
var STORE_KEY = "filpoll_proto_v1";
function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || null; } catch (e) { return null; }
}
function saveStore() { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); }

/* ---------------- roles / profiles ---------------- */
var ROLES = [
  { id: "sp",       name: "Storage Provider", weight: 3, emoji: "🖥️", desc: "Operates Filecoin storage; weight reflects committed power." },
  { id: "allocator",name: "Allocator",        weight: 3, emoji: "🗝️", desc: "Allocates DataCap under the Fil+ program." },
  { id: "token",    name: "Token Holder",     weight: 2, emoji: "🪙", desc: "Holds FIL; economic stake in outcomes." },
  { id: "coredev",  name: "Core Developer",   weight: 2, emoji: "🛠️", desc: "Contributes to protocol / reference implementations." },
  { id: "client",   name: "Client",           weight: 1, emoji: "📦", desc: "Stores data on the network." },
  { id: "community",name: "Community Member",  weight: 1, emoji: "🌐", desc: "Ecosystem participant, no on-chain role required." }
];
function roleById(id) { for (var i=0;i<ROLES.length;i++) if (ROLES[i].id===id) return ROLES[i]; return null; }

/* ---------------- seed data ---------------- */
function seedDB() {
  return {
    // ecosystem directory — DISCOVERY ONLY. Example addresses (not real).
    directory: [
      { name: "Sunrise Storage (SP f01234)", addr: "0x71C7656EC7ab88b098defB751B7401B5f6d8976F", role: "sp" },
      { name: "DataCap Allocator — EU", addr: "0x3A5bd1E37b099aE3386D13947b6a90d97675e5e3", role: "allocator" },
      { name: "Foundation Treasury (multisig)", addr: "0x2B5AD5c4795c026514f8317c7a215E218DcCD6cF", role: "token" },
      { name: "Core Dev — @kernel-jo", addr: "0x9E2f2B4A5c8d7E1f0A3b6C9d2E5f8A1b4C7d0E3f", role: "coredev" }
    ],
    polls: [
      {
        id: "fip0100", type: "sentiment", createdBy: "seed",
        title: "FIP-0100: Allow F4 sub-account creation",
        body: "Allow creation of F4 sub-accounts to enable delegated address hierarchies.",
        frontmatter: { FIP: "0100", Status: "Draft", Type: "Technical", Created: "2026-05-02" },
        statements: [], createdAt: "2026-05-02",
        comments: [
          { who: "@validator-anna", when: "2 days ago", text: "Looks good. The migration path is clear and the gas implications are acceptable." },
          { who: "@miner-bob", when: "1 day ago", text: "I'd like to see test vectors covering the edge case where an existing F1 account also has a delegated address." },
          { who: "@dev-carol", when: "8 hours ago", text: "Agreed with @miner-bob — also worth specifying the behavior on revert." }
        ],
        votes: [
          { role: "sp", value: "pos" }, { role: "sp", value: "pos" }, { role: "allocator", value: "pos" },
          { role: "token", value: "pos" }, { role: "coredev", value: "pos" }, { role: "community", value: "pos" },
          { role: "sp", value: "neg" }, { role: "token", value: "neg" }, { role: "client", value: "pos" },
          { role: "coredev", value: "pos" }, { role: "community", value: "pos" }, { role: "allocator", value: "pos" }
        ]
      },
      {
        id: "gov1", type: "discussion", createdBy: "seed",
        title: "What governance platforms work best for you?",
        body: "Open discussion poll — vote on statements below and add your own.",
        frontmatter: null, createdAt: "2026-04-20", comments: [],
        statements: [
          { id: "s1", text: "We should use Matrix/Element to give the community a decentralized place to discuss governance." },
          { id: "s2", text: "Governance discussions should be archived in a public, searchable place." },
          { id: "s3", text: "The number of governance platforms is currently overwhelming." },
          { id: "s4", text: "Final FIP decisions should always be recorded in the canonical Github repo." }

var DB = loadStore() || seedDB();

/* ---------------- in-memory wallet (no persistence of keys) ---------------- */
var wallet = null; // { address, mode: 'injected'|'demo', _demoKey?: {publicKey, privateKey} }

/* ---------------- crypto helpers ---------------- */
function toHex(buf) {
  var b = new Uint8Array(buf), s = "";
  for (var i=0;i<b.length;i++) s += b[i].toString(16).padStart(2, "0");
  return s;
}
async function sha256(str) {
  var data = new TextEncoder().encode(str);
  return await crypto.subtle.digest("SHA-256", data);
}
function randHex(n) {
  var a = new Uint8Array(n); crypto.getRandomValues(a); return toHex(a);
}
// Demo-only address derivation: address = 0x + last 20 bytes of sha256(pubkey).
// (Real wallets use secp256k1/keccak; demo mode uses Web Crypto P-256 so the
//  claim signature can be *verified in-browser* end-to-end without any lib.)
async function deriveDemoAddress(publicKey) {
  var raw = await crypto.subtle.exportKey("raw", publicKey);
  var h = await sha256(toHex(raw));
  return "0x" + toHex(h).slice(-40);
}

async function connectDemoWallet() {
  var kp = await crypto.subtle.generateKey(
    { name: "ECDSA", namedCurve: "P-256" }, false, ["sign", "verify"]
  );
  var addr = await deriveDemoAddress(kp.publicKey);
  // NOTE: kp.privateKey is a non-extractable CryptoKey held only in memory.
  wallet = { address: addr, mode: "demo", _demoKey: kp };
  return wallet;
}
async function connectInjectedWallet() {
  if (!window.ethereum) throw new Error("No injected wallet found");
  var accts = await window.ethereum.request({ method: "eth_requestAccounts" });
  if (!accts || !accts.length) throw new Error("No account authorized");
  wallet = { address: accts[0], mode: "injected" };
  return wallet;
}
// Sign a challenge. Real wallets -> EIP-191 personal_sign. Demo -> P-256 ECDSA.
async function signChallenge(message) {
  if (!wallet) throw new Error("No wallet connected");
  if (wallet.mode === "injected") {
    var sig = await window.ethereum.request({ method: "personal_sign", params: [message, wallet.address] });
    return { sig: sig, scheme: "eip191-personal_sign" };
  }
  var data = new TextEncoder().encode(message);
  var sigBuf = await crypto.subtle.sign({ name: "ECDSA", hash: "SHA-256" }, wallet._demoKey.privateKey, data);
  return { sig: "0x" + toHex(sigBuf), scheme: "p256-ecdsa(demo)", _verifyKey: wallet._demoKey.publicKey };
}
// Verify (demo path only — proves signer==address in-browser).
async function verifyDemoSignature(message, sigHex, publicKey, expectedAddr) {
  var bytes = sigHex.replace(/^0x/, "").match(/.{2}/g).map(function(h){return parseInt(h,16);});
  var ok = await crypto.subtle.verify(
    { name: "ECDSA", hash: "SHA-256" }, publicKey,
    new Uint8Array(bytes), new TextEncoder().encode(message)
  );
  if (!ok) return false;
  var derived = await deriveDemoAddress(publicKey);
  return derived.toLowerCase() === expectedAddr.toLowerCase();
}

/* ---------------- session helpers ---------------- */
var SESSION_TTL_MS = 12 * 60 * 60 * 1000; // 12h
function activeSessionFor(addr) {
  var now = nowMs();
  for (var i=0;i<DB.sessions.length;i++) {
    var s = DB.sessions[i];
    if (s.address.toLowerCase() === addr.toLowerCase() && !s.revoked && s.expiresAt > now) return s;
  }
  return null;
}
// nowMs is injected via a tiny shim so the file has one clock source.
function nowMs() { return Number(new Date().valueOf()); }
function fmtRemaining(ms) {
  if (ms <= 0) return "expired";
  var h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000);
  return h > 0 ? (h + "h " + m + "m") : (m + "m");
}
function shortAddr(a) { return a.slice(0, 6) + "…" + a.slice(-4); }

/* ---------------- current profile ---------------- */
function currentProfile() {
  if (!wallet) return null;
  return DB.profiles[wallet.address.toLowerCase()] || null;
}
function ensureProfile() {
  var k = wallet.address.toLowerCase();
  if (!DB.profiles[k]) DB.profiles[k] = { addr: wallet.address, defaultRole: null, roleByPoll: {} };
  return DB.profiles[k];
}
// Which role am I voting as for a given poll? Per-topic override, else default.
function roleForPoll(pollId) {
  var p = currentProfile();
  if (!p) return null;
  if (p.roleByPoll && p.roleByPoll[pollId]) return p.roleByPoll[pollId];
  return p.defaultRole;
}

/* ---------------- claim flow ---------------- */
function startClaim(targetAddr, roleId, sourceLabel) {
  var isInjected = wallet.mode === "injected";
  var addressMatches = targetAddr.toLowerCase() === wallet.address.toLowerCase();

  // Real security rule: you can only claim an address you can sign with.
  if (isInjected && !addressMatches) {
    openModal(
      '<h3>Connect the right wallet</h3>' +
      '<p>To claim <b style="font-family:monospace">' + shortAddr(targetAddr) + '</b> you must sign with that ' +
      'address. Your connected wallet is <b style="font-family:monospace">' + shortAddr(wallet.address) + '</b>.</p>' +
      '<p class="hint">Switch accounts in your wallet to the address you want to claim, then try again. ' +
      'This is the check that stops anyone claiming an address they do not control.</p>' +
      '<div class="row" style="justify-content:flex-end;margin-top:8px;"><button class="btn btn-outline" onclick="closeModal()">OK</button></div>'
    );
    return;
  }

  var role = roleById(roleId) || roleById(ensureProfile().defaultRole) || ROLES[ROLES.length-1];
  var nonce = randHex(16);
  var issued = nowIso();
  var expires = nowIso(SESSION_TTL_MS);
  var challenge =
    "Fil Poll — Claim address\n" +
    "Address: " + targetAddr + "\n" +
    "Role: " + role.name + "\n" +
    "Nonce: " + nonce + "\n" +
    "Issued: " + issued + "\n" +
    "Expires: " + expires + "\n" +
    "This signature proves control of the address for voting. " +
    "It does NOT authorize any transaction, transfer, or contract call.";

  var demoNote = (wallet.mode === "demo" && !addressMatches)
    ? '<div class="callout warn">Demo mode: you don\'t hold the key for this directory address, so the ' +
      'signature is <b>simulated</b> for illustration. With a real wallet, claiming a listed address ' +
      'requires connecting <i>that</i> address.</div>'
    : '';

  openModal(
    '<h3>Sign to claim</h3>' +
    '<p class="hint">Review the message your wallet will sign. Nothing is broadcast on-chain.</p>' +
    demoNote +
    '<div class="sig-preview">' + escapeHtml(challenge) + '</div>' +
    '<div class="row" style="justify-content:flex-end;gap:10px;">' +
      '<button class="btn btn-outline" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" id="doSign">🔏 Sign with wallet</button>' +
    '</div>'
  );

  document.getElementById("doSign").onclick = async function() {
    this.disabled = true; this.textContent = "Waiting for signature…";
    try {
      var signed = await signChallenge(challenge);
      var verified = false, verifyNote = "server-side (ecrecover)";
      // Demo path where we DO hold the key: verify in-browser for real.
      if (signed.scheme.indexOf("p256") === 0 && addressMatches && signed._verifyKey) {
        verified = await verifyDemoSignature(challenge, signed.sig, signed._verifyKey, targetAddr);
        verifyNote = verified ? "verified in-browser ✓" : "verification FAILED";
        if (!verified) { toast("Signature did not match address", "err"); this.disabled=false; this.textContent="🔏 Sign with wallet"; return; }
      }
      // Record the delegated session. We persist the signature payload the
      // server would check — never any private key.
      var session = {
        address: targetAddr, role: role.id, sessionId: "sess_" + randHex(8),
        scheme: signed.scheme, signature: signed.sig, nonce: nonce,
        issuedAt: nowMs(), expiresAt: nowMs() + SESSION_TTL_MS,
        verify: verifyNote, revoked: false, source: sourceLabel || "connected"
      };
      // one active session per address
      DB.sessions = DB.sessions.filter(function(s){ return s.address.toLowerCase() !== targetAddr.toLowerCase(); });
      DB.sessions.push(session);

      // bind role into profile if claiming own address
      if (addressMatches) {
        var prof = ensureProfile();
        if (!prof.defaultRole) prof.defaultRole = role.id;
      }
      saveStore();
      closeModal();
      toast("Address claimed · session valid " + fmtRemaining(SESSION_TTL_MS), "ok");
      render();
    } catch (e) {
      toast("Signing was cancelled or failed", "err");
      this.disabled = false; this.textContent = "🔏 Sign with wallet";
    }
  };
}

function nowIso(offsetMs) {
  var d = new Date(nowMs() + (offsetMs || 0));
  return d.toISOString().replace(/\.\d+Z$/, "Z");
}
function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ---------------- vote counting ---------------- */
function countVotes(p) {
  var total = p.votes.length;
  return { total: total };
}
function weightedSentiment(p) {
  var pos = 0, neg = 0, byRole = {};
  p.votes.forEach(function(v){
    var w = roleById(v.role) ? roleById(v.role).weight : 1;
    if (!byRole[v.role]) byRole[v.role] = { pos:0, neg:0 };
    if (v.value === "pos") { pos += w; byRole[v.role].pos += 1; }
    else if (v.value === "neg") { neg += w; byRole[v.role].neg += 1; }
  });
  var totW = pos + neg;
  return { pos: pos, neg: neg, posPct: totW ? Math.round(pos/totW*100) : 0, negPct: totW ? Math.round(neg/totW*100) : 0, byRole: byRole, raw: p.votes.length };
}
function statementStats(p, sid) {
  var agree=0, disagree=0, skip=0, aw=0, dw=0;
  p.votes.forEach(function(v){
    if (v.sid !== sid) return;
    var w = roleById(v.role) ? roleById(v.role).weight : 1;
    if (v.value==="agree"){agree++;aw+=w;} else if (v.value==="disagree"){disagree++;dw+=w;} else skip++;
  });
  var tot = agree+disagree;
  return { agree:agree, disagree:disagree, skip:skip, agreePct: tot?Math.round(agree/tot*100):0, aw:aw, dw:dw, totVotes: agree+disagree+skip };
}

  var comments = p.comments.map(function(c){
    return '<div class="comment"><div><span class="who">' + c.who + '</span><span class="when">' + c.when + '</span></div><div>' + escapeHtml(c.text) + '</div></div>';
  }).join("") || '<div class="hint">No comments yet.</div>';

  return '<div class="content" style="max-width:760px">' +
    '<div class="crumb"><a id="backDash">← Dashboard</a></div>' +
    '<h2 style="margin:0 0 8px">' + escapeHtml(p.title) + '</h2>' +
    '<p class="muted" style="margin-top:0">' + escapeHtml(p.body) + '</p>' +
    (fm ? '<div class="card">' + fm + '</div>' : '') +
    profileControls(p) +
    '<div class="card"><h3>Sentiment check</h3>' +
      '<div class="sentiment">' +
        '<div class="col"><button id="votePos"><span style="color:var(--green)">😊</span> Positive</button>' +
          '<div class="count">' + s.pos + ' weighted · ' + s.posPct + '%</div></div>' +
        '<div class="col"><button id="voteNeg"><span style="color:var(--red)">☹</span> Negative</button>' +
          '<div class="count">' + s.neg + ' weighted · ' + s.negPct + '%</div></div>' +
      '</div>' +
      '<div class="meter"><span class="pos" style="width:' + s.posPct + '%"></span><span class="neg" style="width:' + s.negPct + '%"></span></div>' +
      '<p class="hint" style="margin-top:10px">Weighted by profile: ' + s.raw + ' raw votes. Positive weight ' + s.pos + ' vs negative ' + s.neg + '.</p>' +
    '</div>' +
    sentimentAiPanel(p, s) +
    '<div class="card"><h3>Comments</h3>' + comments +
      '<div class="divider"></div>' +
      '<textarea id="cmtBox" placeholder="Add a comment…"></textarea>' +
      '<div class="row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-sm" id="addCmt">Comment</button></div>' +
    '</div>' +
    '<div class="row" style="justify-content:flex-end"><button class="btn btn-outline" id="toReport">View full report →</button></div>' +
  '</div>';
}
var polisIndex = {};
function viewDiscussionPoll(p) {
  var idx = polisIndex[p.id] || 0;
  if (idx >= p.statements.length) idx = p.statements.length; // past the end
  var voted = idx;
  var total = p.statements.length;

  var cardHtml;
  if (idx < total) {
    var st = p.statements[idx];
    cardHtml = '<div class="polis-card"><div class="body">' + escapeHtml(st.text) + '</div>' +
      '<div class="polis-buttons">' +
        '<button data-vote="agree"><span style="color:var(--green)">👍</span> Agree</button>' +
        '<button data-vote="disagree"><span style="color:var(--red)">👎</span> Disagree</button>' +
        '<button data-vote="skip"><span>⏭</span> Skip</button>' +
      '</div></div>';
  } else {
    cardHtml = '<div class="polis-card"><div class="body" style="display:flex;align-items:center;justify-content:center;color:var(--mediumGray)">' +
      '✅ You\'ve voted on every statement. Add your own below, or view the report.</div></div>';
  }

  return '<div class="content" style="max-width:640px">' +
    '<div class="crumb"><a id="backDash">← Dashboard</a></div>' +
    '<h2 style="margin:0 0 4px">' + escapeHtml(p.title) + '</h2>' +
    '<p class="muted" style="margin-top:0">' + escapeHtml(p.body) + '</p>' +
    profileControls(p) +
    '<div class="polis-progress"><span>' + voted + ' / ' + total + ' voted</span>' +
      '<span class="bar"><span class="fill" style="width:' + (total?Math.round(voted/total*100):0) + '%"></span></span>' +
      '<span>' + Math.max(0,total-voted) + ' left</span></div>' +
    cardHtml +
    '<div class="card" style="margin-top:22px"><h3>Add a statement</h3>' +
      '<p class="hint" style="margin-top:0">Others will vote on it individually. Statements are anonymous to other voters.</p>' +
      '<textarea id="stmtBox" placeholder="Add a new statement…"></textarea>' +
      '<div class="row" style="justify-content:flex-end;margin-top:8px"><button class="btn btn-sm" id="addStmt">Submit</button></div>' +
    '</div>' +
    '<div class="row" style="justify-content:flex-end"><button class="btn btn-outline" id="toReport">View report + insights →</button></div>' +
  '</div>';
}

/* ---------------- on-device AI insight ---------------- */
// Small lexicon for free-text sentiment on comments/statements.
var POS_WORDS = ["good","great","clear","agree","support","acceptable","improve","benefit","favor","sensible","reasonable","positive","yes","align","works"];
var NEG_WORDS = ["concern","risk","against","disagree","problem","unclear","edge case","revert","overwhelming","bust","cliff","no","worse","block","bad"];
function lexScore(text) {
  var t = " " + text.toLowerCase() + " ", pos=0, neg=0;
  POS_WORDS.forEach(function(w){ if (t.indexOf(w)>=0) pos++; });
  NEG_WORDS.forEach(function(w){ if (t.indexOf(w)>=0) neg++; });
  return pos - neg;
}
function topRolesByWeight(byRole, key) {
  var arr = Object.keys(byRole).map(function(rid){ return { rid: rid, n: byRole[rid][key] }; })
    .filter(function(x){ return x.n>0; }).sort(function(a,b){ return b.n-a.n; });
  return arr.map(function(x){ return roleById(x.rid) ? roleById(x.rid).name : x.rid; });
}
function sentimentAiPanel(p, s) {
  var lead = s.posPct >= s.negPct;
  var strength = Math.abs(s.posPct - s.negPct);
  var tone = strength >= 50 ? (lead?"strongly positive":"strongly negative")
    : strength >= 20 ? (lead?"leaning positive":"leaning negative")
    : "divided";
  var posRoles = topRolesByWeight(s.byRole, "pos");
  var negRoles = topRolesByWeight(s.byRole, "neg");
  var commentScores = p.comments.map(function(c){ return lexScore(c.text); });
  var commentNet = commentScores.reduce(function(a,b){return a+b;}, 0);
  var commentTone = commentScores.length ? (commentNet>0?"broadly supportive":commentNet<0?"raising concerns":"mixed") : "";

  var headline = "Community sentiment is " + tone + " (" + Math.max(s.posPct,s.negPct) + "% " + (lead?"positive":"negative") + ", weighted).";
  var l2 = posRoles.length ? ("Support is led by " + humanList(posRoles.slice(0,2)) + ".") : "";
  var l3 = negRoles.length ? ("Reservations come mainly from " + humanList(negRoles.slice(0,2)) + ".") : "";
  var l4 = p.comments.length
    ? ("Discussion is " + commentTone + " across " + p.comments.length + " comments.")
    : "No comment discussion yet.";
  var rec = tone === "divided"
    ? "Recommendation: treat as contested — surface the dissenting rationale before advancing."
    : (lead ? "Recommendation: rough consensus in favor; note minority concerns in the FIP thread."
            : "Recommendation: rough consensus against in its current form; expect revisions.");

  var chips = "";
  posRoles.slice(0,3).forEach(function(r){ chips += '<span class="chip pos">+ ' + r + '</span>'; });
  negRoles.slice(0,3).forEach(function(r){ chips += '<span class="chip neg">– ' + r + '</span>'; });

  return aiShell(
    '<div class="headline">🧭 ' + escapeHtml(headline) + '</div>' +
    (l2?'<p>'+escapeHtml(l2)+' '+escapeHtml(l3)+'</p>':'') +
    '<p>' + escapeHtml(l4) + '</p>' +
    '<div style="margin:6px 0 10px">' + chips + '</div>' +
    '<p style="color:var(--textDark)"><b>' + escapeHtml(rec) + '</b></p>'
  );
}
function discussionAiPanel(p) {
  var stats = p.statements.map(function(st){ return { st: st, s: statementStats(p, st.id) }; });
  var withVotes = stats.filter(function(x){ return x.s.agree + x.s.disagree > 0; });
  var consensus = withVotes.filter(function(x){ return x.s.agreePct >= 70; }).sort(function(a,b){return b.s.agreePct-a.s.agreePct;});
  var divisive = withVotes.slice().sort(function(a,b){ return Math.abs(50-a.s.agreePct) - Math.abs(50-b.s.agreePct); });
  var mostDivisive = divisive.length ? divisive[0] : null;

  var headline = withVotes.length
    ? ("Across " + withVotes.length + " voted statements, " + consensus.length + " reached ≥70% weighted agreement.")
    : "No votes yet — cast a few to generate insights.";
  var l2 = consensus.length ? ("Strongest consensus: “" + trim(consensus[0].st.text) + "” (" + consensus[0].s.agreePct + "% agree).") : "";
  var l3 = (mostDivisive && Math.abs(50-mostDivisive.s.agreePct) < 20)
    ? ("Most divisive: “" + trim(mostDivisive.st.text) + "” (" + mostDivisive.s.agreePct + "% agree) — a likely fault line between opinion groups.")
    : "";
  var rec = consensus.length
    ? "Recommendation: the consensus statements are safe to carry forward; focus deliberation on the divisive one."
    : "Recommendation: gather more votes before drawing conclusions.";

  var chips = "";
  consensus.slice(0,3).forEach(function(x){ chips += '<span class="chip pos">' + x.s.agreePct + '% · ' + escapeHtml(trim(x.st.text, 34)) + '</span>'; });

  return aiShell(
    '<div class="headline">🧭 ' + escapeHtml(headline) + '</div>' +
    (l2?'<p>'+escapeHtml(l2)+'</p>':'') +
    (l3?'<p>'+escapeHtml(l3)+'</p>':'') +
    '<div style="margin:6px 0 10px">' + chips + '</div>' +
    '<p style="color:var(--textDark)"><b>' + escapeHtml(rec) + '</b></p>'
  );
}
function aiShell(inner) {
  return '<div class="ai-panel">' +
    '<div class="ai-head"><span class="badge">AI insight</span><span class="title">Quick sentiment overview</span></div>' +
    '<div class="ai-body">' + inner + '</div>' +
    '<div class="ai-foot">Generated on-device from the current results (no data leaves your browser). ' +
      'In production the same summary is produced server-side by Claude over the same inputs.</div>' +
  '</div>';
}
function humanList(a) { return a.length<=1 ? (a[0]||"") : a.slice(0,-1).join(", ") + " and " + a[a.length-1]; }
function trim(s, n) { n = n||70; return s.length>n ? s.slice(0,n-1)+"…" : s; }

/* ---------------- view: report ---------------- */
function viewReport(pollId) {
  var p = getPoll(pollId);
  if (!p) return '<div class="content"><div class="empty">Poll not found.</div></div>';
  var participants = uniqueVoters(p);
  var totalVotes = p.votes.length;

  var aiPanel, breakdown;
  if (p.type === "sentiment") {
    var s = weightedSentiment(p);
    aiPanel = sentimentAiPanel(p, s);
    breakdown = '<div class="card"><h3>Weighted result</h3>' +
      barRow("Positive", s.posPct, "var(--green)") + barRow("Negative", s.negPct, "var(--red)") + '</div>' +
      roleBreakdown(p);
  } else {
    aiPanel = discussionAiPanel(p);
    breakdown = '<div class="card"><h3>Per-statement agreement (weighted)</h3>' +
      p.statements.map(function(st){
        var ss = statementStats(p, st.id);
        return barRow(trim(st.text, 60), ss.agreePct, "var(--primary)");
      }).join("") + '</div>';
  }

  return '<div class="content">' +
    '<div class="crumb"><a id="backPoll">← Back to poll</a> · <a id="backDash">Dashboard</a></div>' +
    '<h2 style="margin:0 0 6px">Report — ' + escapeHtml(p.title) + '</h2>' +
    '<div class="report-stats">' +
      stat(participants, "Participants") +
      stat(p.type==="sentiment" ? p.comments.length : p.statements.length, p.type==="sentiment"?"Comments":"Statements") +
      stat(totalVotes, "Votes") +
      stat(p.type==="sentiment" ? (weightedSentiment(p).posPct + "%") : (topConsensusPct(p)+"%"), p.type==="sentiment"?"Positive":"Top consensus") +
    '</div>' +
    aiPanel +
    breakdown +
  '</div>';
}
function barRow(label, pct, color) {
  return '<div class="bars-row"><div class="lab">' + escapeHtml(label) + '</div>' +
    '<div class="track"><span style="width:' + pct + '%;background:' + color + '"></span></div>' +
    '<div class="pct">' + pct + '%</div></div>';
}
function roleBreakdown(p) {
  var s = weightedSentiment(p);
  var rows = Object.keys(s.byRole).map(function(rid){
    var r = roleById(rid), b = s.byRole[rid];
    return '<div class="bars-row"><div class="lab">' + (r?r.emoji+" "+r.name:rid) + '</div>' +
      '<div class="muted">' + b.pos + ' pos · ' + b.neg + ' neg</div></div>';
  }).join("");
  return '<div class="card"><h3>By profile</h3>' + (rows || '<div class="hint">No votes yet.</div>') + '</div>';
}
function stat(v, l) { return '<div class="stat"><div class="v">' + v + '</div><div class="l">' + l + '</div></div>'; }
function topConsensusPct(p) {
  var best = 0;
  p.statements.forEach(function(st){ var s = statementStats(p, st.id); if (s.agree+s.disagree>0) best = Math.max(best, s.agreePct); });
  return best;
}
function uniqueVoters(p) {
  // Prototype: seed votes are anonymous role samples; count them plus this user's marker.
  return p.votes.length ? p.votes.length : 0;
}

/* ---------------- data helpers ---------------- */
function getPoll(id) { for (var i=0;i<DB.polls.length;i++) if (DB.polls[i].id===id) return DB.polls[i]; return null; }

/* ---------------- create poll modal ---------------- */
function openCreatePoll() {
  openModal(
    '<h3>Create a poll</h3>' +
    '<label class="field" style="margin-top:10px">Type</label>' +
    '<div class="seg" style="margin-bottom:14px">' +
      '<button id="tSent" class="active">🎯 Sentiment check</button>' +
      '<button id="tDisc">📊 Discussion</button>' +
    '</div>' +
    '<label class="field">Question / title</label>' +
    '<input type="text" id="npTitle" placeholder="e.g. FIP-0123: Raise sector minimum" />' +
    '<label class="field" style="margin-top:12px">Description</label>' +
    '<textarea id="npBody" placeholder="A sentence describing what people are weighing in on."></textarea>' +
    '<div id="discExtra" style="display:none">' +
      '<label class="field" style="margin-top:12px">Seed statements (one per line, optional)</label>' +
      '<textarea id="npStmts" placeholder="Statement one&#10;Statement two"></textarea>' +
    '</div>' +
    '<div class="row" style="justify-content:flex-end;gap:10px;margin-top:16px">' +
      '<button class="btn btn-outline" onclick="closeModal()">Cancel</button>' +
      '<button class="btn" id="npCreate">Create poll</button>' +
    '</div>'
  );
  var type = "sentiment";
  document.getElementById("tSent").onclick = function(){ type="sentiment"; this.classList.add("active"); document.getElementById("tDisc").classList.remove("active"); document.getElementById("discExtra").style.display="none"; };
  document.getElementById("tDisc").onclick = function(){ type="discussion"; this.classList.add("active"); document.getElementById("tSent").classList.remove("active"); document.getElementById("discExtra").style.display="block"; };
  document.getElementById("npCreate").onclick = function(){
    var title = document.getElementById("npTitle").value.trim();
    if (!title) { toast("Give your poll a title", "err"); return; }
    var body = document.getElementById("npBody").value.trim();
    var id = "p_" + randHex(4);
    var poll = { id:id, type:type, createdBy: wallet.address, title:title, body:body || "Community poll.",
      frontmatter:null, statements:[], comments:[], votes:[], createdAt: nowIso().slice(0,10) };
    if (type === "discussion") {
      var lines = (document.getElementById("npStmts").value || "").split("\n").map(function(x){return x.trim();}).filter(Boolean);
      poll.statements = lines.map(function(t,i){ return { id:"s"+(i+1), text:t }; });
    }
    DB.polls.push(poll); saveStore(); closeModal();
    toast("Poll created", "ok");
    go("poll", id);
  };
}

/* ---------------- event wiring ---------------- */
function wireEvents() {
  bind("disconnectBtn", "click", function(){ wallet = null; go("connect"); });

  // connect
  bind("connectInjected", "click", async function(){
    try { await connectInjectedWallet(); toast("Wallet connected", "ok"); go(needsOnboard()?"onboard":"dashboard"); }
    catch(e){ toast("Could not connect wallet", "err"); }
  });
  bind("connectDemo", "click", async function(){
    try { await connectDemoWallet(); toast("Demo wallet ready", "ok"); go(needsOnboard()?"onboard":"dashboard"); }
    catch(e){ toast("Demo wallet failed", "err"); }
  });

  // onboarding
  qsAll(".role-card").forEach(function(el){
    el.addEventListener("click", function(){
      var prof = ensureProfile(); prof.defaultRole = el.getAttribute("data-role"); saveStore(); render();
    });
  });
  var selectedDir = null;
  qsAll(".dir-item").forEach(function(el){
    el.addEventListener("click", function(){
      qsAll(".dir-item").forEach(function(x){x.classList.remove("selected");});
      el.classList.add("selected");
      var d = DB.directory[parseInt(el.getAttribute("data-diridx"),10)];
      selectedDir = d;
      startClaim(d.addr, d.role, "directory:" + d.name);
    });
  });
  bind("dirSearch", "input", function(){
    var q = this.value.toLowerCase();
    qsAll("#dirList .dir-item").forEach(function(el){
      var d = DB.directory[parseInt(el.getAttribute("data-diridx"),10)];
      var hay = (d.name + " " + d.addr + " " + roleById(d.role).name).toLowerCase();
      el.style.display = hay.indexOf(q)>=0 ? "" : "none";
    });
  });
  bind("claimConnected", "click", function(){
    var prof = ensureProfile();
    startClaim(wallet.address, prof.defaultRole || "community", "connected");
  });
  bind("revokeSess", "click", function(){
    var sess = activeSessionFor(wallet.address);
    if (sess) { sess.revoked = true; saveStore(); toast("Session revoked", "ok"); render(); }
  });
  bind("toDashboard", "click", function(){ go("dashboard"); });

  // dashboard
  bind("editProfile", "click", function(){ go("onboard"); });
  bind("newPoll", "click", openCreatePoll);
  qsAll("[data-filter]").forEach(function(el){
    el.addEventListener("click", function(){ dashFilter = el.getAttribute("data-filter"); render(); });
  });
  qsAll("[data-poll]").forEach(function(el){
    el.addEventListener("click", function(){ go("poll", el.getAttribute("data-poll")); });
  });

  // poll nav
  bind("backDash", "click", function(){ go("dashboard"); });
  bind("backPoll", "click", function(){ go("poll", route.pollId); });
  bind("toReport", "click", function(){ go("report", route.pollId); });

  // per-poll role select
  bind("pollRole", "change", function(){
    var prof = ensureProfile();
    prof.roleByPoll[route.pollId] = this.value; saveStore();
    toast("Voting as " + roleById(this.value).name + " on this poll", "ok");
  });

  // sentiment voting
  bind("votePos", "click", function(){ castSentiment("pos"); });
  bind("voteNeg", "click", function(){ castSentiment("neg"); });
  bind("addCmt", "click", function(){
    var box = document.getElementById("cmtBox"); var t = box.value.trim();
    if (!t) return;
    var p = getPoll(route.pollId);
    p.comments.unshift({ who: shortAddr(wallet.address), when: "just now", text: t });
    saveStore(); render();
  });

  // discussion voting
  qsAll("[data-vote]").forEach(function(el){
    el.addEventListener("click", function(){ castDiscussion(el.getAttribute("data-vote")); });
  });
  bind("addStmt", "click", function(){
    var box = document.getElementById("stmtBox"); var t = box.value.trim();
    if (!t) return;
    var p = getPoll(route.pollId);
    p.statements.push({ id: "s" + (p.statements.length+1) + "_" + randHex(2), text: t });
    saveStore(); toast("Statement added", "ok"); render();
  });
}

function needsOnboard() {
  var p = currentProfile();
  return !p || !p.defaultRole;
}
// Guard: voting requires a chosen role. It does NOT require an active delegated
// session in the prototype, but we surface whether one exists (that is the
// travel-without-HW-wallet convenience layer).
function requireRole(pollId) {
  var r = roleForPoll(pollId);
  if (!r) { toast("Pick a profile to vote as (top of page)", "err"); return null; }
  return r;
}
function castSentiment(value) {
  var role = requireRole(route.pollId); if (!role) return;
  var p = getPoll(route.pollId);
  p.votes.push({ role: role, value: value, voter: wallet.address.toLowerCase() });
  saveStore();
  toast("Vote recorded as " + roleById(role).name, "ok");
  render();
}
function castDiscussion(value) {
  var role = requireRole(route.pollId); if (!role) return;
  var p = getPoll(route.pollId);
  var idx = polisIndex[p.id] || 0;
  if (idx >= p.statements.length) return;
  var st = p.statements[idx];
  p.votes.push({ sid: st.id, role: role, value: value, voter: wallet.address.toLowerCase() });
  polisIndex[p.id] = idx + 1;
  saveStore();
  render();
}

/* ---------------- tiny DOM helpers ---------------- */
function bind(id, ev, fn) { var el = document.getElementById(id); if (el) el.addEventListener(ev, fn); }
function qsAll(sel) { return Array.prototype.slice.call(document.querySelectorAll(sel)); }

/* ---------------- boot ---------------- */
// Expose a couple of handlers used by inline onclick in modals.
window.closeModal = closeModal;
render();
</script>
